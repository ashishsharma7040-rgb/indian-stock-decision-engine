services:
  - type: web
    name: indian-stock-decision-engine-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
      - key: DATA_SOURCE_PREFERENCE
        value: nsefin
      - key: ENABLE_CORPORATE_ACTIONS_ADJUSTMENT
        value: "true"
      - key: NSE_BHAVCOPY_CACHE_HOURS
        value: "6"
      - key: NSE_FUNDAMENTALS_REFRESH_DAYS
        value: "90"
      - key: MIN_INVESTABLE_TURNOVER_RS
        value: "100000000"
      - key: MIN_DELIVERY_PCT
        value: "40"
      - key: MIN_VOLUME_CONSISTENCY_RATIO
        value: "0.8"
      - key: SMALLCAP_INDEX_SYMBOL
        value: "^CNXSC"
      - key: FULL_NSE_SCAN_LIMIT
        value: "1000"
      - key: FULL_NSE_SCAN_MAX
        value: "1500"
      - key: SCAN_WORKERS
        value: "8"
      - key: FULL_SCAN_REQUIRE_SECRET
        value: "false"
      - key: ENABLE_DAILY_FULL_SCAN
        value: "false"
