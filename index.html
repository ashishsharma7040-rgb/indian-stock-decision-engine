<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indian Stock Decision Engine</title>
  <link rel="stylesheet" href="./frontend/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Indian Stock Decision Engine</strong>
      <span>Business + sector + event + chart + market + risk</span>
    </div>
    <div class="market-strip" id="marketStrip"></div>
    <img class="desk-shot" alt="Market desk" src="https://images.unsplash.com/photo-1559526324-593bc073d938?auto=format&fit=crop&w=360&q=70">
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div>
          <div class="section-kicker">Universe</div>
          <strong id="universeCount">0 names</strong>
        </div>
        <button class="btn" id="homeBtn">Home</button>
      </div>
      <input class="input" id="searchInput" type="search" placeholder="Search symbol, sector, industry">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="weekly">Weekly</button>
        <button class="filter-btn" data-filter="monthly">Monthly</button>
        <button class="filter-btn" data-filter="candidate">Candidates</button>
        <button class="filter-btn" data-filter="avoid">Avoid</button>
      </div>
      <div class="stock-list" id="stockList"></div>
    </aside>

    <section class="workspace">
      <div id="offlineNotice" class="notice hidden"></div>
      <section id="homeView"></section>
      <section id="stockView" class="hidden"></section>
    </section>
  </main>

  <script src="./frontend/demo-data.js"></script>
  <script src="./frontend/config.js"></script>
  <script src="./frontend/app.js"></script>
</body>
</html>
