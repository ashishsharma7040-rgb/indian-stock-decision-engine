services:
  - type: web
    name: indian-stock-decision-engine-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
      - key: DATA_SOURCE_PREFERENCE
        value: nsefin
      - key: ENABLE_CORPORATE_ACTIONS_ADJUSTMENT
        value: "true"
      - key: NSE_BHAVCOPY_CACHE_HOURS
        value: "6"
      - key: NSE_FUNDAMENTALS_REFRESH_DAYS
        value: "90"
      - key: MIN_INVESTABLE_TURNOVER_RS
        value: "100000000"
      - key: MIN_DELIVERY_PCT
        value: "40"
      - key: MIN_VOLUME_CONSISTENCY_RATIO
        value: "0.8"
      - key: SMALLCAP_INDEX_SYMBOL
        value: "^CNXSC"
      - key: FULL_NSE_SCAN_LIMIT
        value: "all"
      - key: FULL_NSE_SCAN_MAX
        value: "3000"
      - key: SCAN_WORKERS
        value: "4"
      - key: SCAN_BATCH_SIZE
        value: "150"
      - key: FULL_NSE_SCAN_DEEP_MODE
        value: "false"
      - key: FULL_SCAN_REQUIRE_SECRET
        value: "false"
      - key: ENABLE_DAILY_FULL_SCAN
        value: "false"
      - key: YAHOO_ENRICH_WORKERS
        value: "2"
      - key: YAHOO_ENRICH_REQUEST_DELAY
        value: "0.6"
      - key: YAHOO_ENRICH_MIN_BARS
        value: "220"
      - key: YAHOO_ENRICH_DB_CHUNK
        value: "500"
      - key: YAHOO_ENRICH_HISTORY_TIMEOUT
        value: "15"
      - key: YAHOO_ENRICH_FUNDAMENTAL_TIMEOUT
        value: "10"
      - key: YAHOO_ENRICH_SKIP_PATTERNS
        value: "BEES,ETF,GOLDBEES,SILVERBEES,LIQUIDBEES,JUNIORBEES,NIFTYBEES,BANKBEES,PSUBNKBEES"
      - key: AUTO_EOD_DB_SYNC
        value: "true"
      - key: BHAVCOPY_RETENTION_DATES
        value: "2"
      - key: BHAVCOPY_MAX_AGE_DAYS
        value: "2"
      - key: BHAVCOPY_INSERT_BATCH_SIZE
        value: "750"
      - key: DB_COMMAND_TIMEOUT
        value: "120"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "120000"
      - key: DB_USE_NULL_POOL
        value: "true"
      - key: DB_POOL_RECYCLE
        value: "300"
      - key: DB_TCP_KEEPALIVES_IDLE
        value: "60"
      - key: DB_TCP_KEEPALIVES_INTERVAL
        value: "10"
      - key: DB_TCP_KEEPALIVES_COUNT
        value: "3"
      - key: DATABASE_URL
        sync: false
      - key: SHOONYA_HOST
        value: https://api.shoonya.com/NorenWClientTP
      - key: SHOONYA_WEBSOCKET
        value: wss://api.shoonya.com/NorenWSTP/
      - key: SHOONYA_AUTO_RECONNECT
        value: "true"
      - key: SHOONYA_RECONNECT_SECONDS
        value: "30"
