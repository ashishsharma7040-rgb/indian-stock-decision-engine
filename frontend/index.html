<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indian Stock Decision Engine</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="commandPalette" class="command-palette hidden" role="dialog" aria-label="Search NSE stocks">
    <div class="palette-header">
      <input id="globalSearchInput" type="search" placeholder="Search NSE symbol or company name. Esc closes." autocomplete="off">
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">IS</span>
      <span class="brand-copy">
        <strong>Indian Stock Decision Engine</strong>
        <em>Decision engine, not prediction app</em>
      </span>
    </div>
    <div class="market-strip" id="marketStrip"></div>
    <div class="top-actions">
      <button class="search-trigger" id="commandSearchBtn" type="button">Ctrl K&nbsp;&nbsp;Search NSE</button>
      <span class="freshness-dot stale" id="freshnessDot" title="Waiting for live refresh"></span>
      <button class="icon-btn" id="topHomeBtn" type="button" title="Home">H</button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div>
          <div class="section-kicker">Universe</div>
          <strong id="universeCount">0 names</strong>
        </div>
        <button class="btn" id="homeBtn">Home</button>
      </div>
      <input class="input" id="searchInput" type="search" placeholder="Ctrl+K: search focus list or all NSE">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="weekly">Weekly</button>
        <button class="filter-btn" data-filter="monthly">Monthly</button>
        <button class="filter-btn" data-filter="candidate">Candidates</button>
        <button class="filter-btn" data-filter="watchlist">Watchlist</button>
        <button class="filter-btn" data-filter="avoid">Avoid</button>
      </div>
      <div class="stock-list" id="stockList"></div>
    </aside>

    <section class="workspace">
      <div id="offlineNotice" class="notice hidden"></div>
      <section id="homeView"></section>
      <section id="stockView" class="hidden"></section>
    </section>
  </main>

  <script src="./demo-data.js"></script>
  <script src="./config.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="./app.js"></script>
</body>
</html>
