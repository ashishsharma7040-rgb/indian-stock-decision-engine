services:
  - type: web
    name: indian-stock-decision-engine-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWSAPI_API_KEY
        sync: false
